<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCF — Verbes &amp; Prépositions</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="../favicon.png">
<style>
  :root {
    --bg:#f5f2ee;--surface:#fff;--surface2:#f9f7f4;--border:#e5e0d8;
    --text:#1a1714;--text-soft:#6b6460;--text-muted:#9d9590;
    --accent:#c8955a;--radius:12px;--radius-sm:6px;

    /* sentence role colours — Option B */
    --r1-bg:#dbeeff;   --r1-text:#1a3d7a;   /* subject   — navy       */
    --r2-bg:#ffeef2;   --r2-text:#8b1a35;   /* verb      — crimson    */
    --r3-bg:#ede0ff;   --r3-text:#4a1a80;   /* prep/pro  — purple     */
    --r4-bg:#eaf4ef;   --r4-text:#2d6a4f;   /* object    — green      */

    /* group colours — card headers, section titles, tabs */
    --col-a-bg:#dbeeff;    --col-a-text:#1a3d7a;    --col-a-border:#b3d4f5;
    --col-de-bg:#eaf4ef;   --col-de-text:#2d6a4f;   --col-de-border:#c3e6d4;
    --col-q-bg:#ede0ff;    --col-q-text:#4a1a80;    --col-q-border:#d4b8f5;
    --col-t-bg:#ffeef2;    --col-t-text:#8b1a35;    --col-t-border:#f5c0cc;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

  /* ── HEADER ── */
  .site-header{background:var(--text);color:#fff;padding:20px 20px 16px;position:sticky;top:0;z-index:100;}
  .site-header h1{font-family:'Fraunces',serif;font-size:18px;font-weight:300;color:#fff;}
  .site-header h1 span{color:var(--accent);font-style:italic;}
  .page-title{font-size:15px;font-weight:500;color:#fff;margin-top:6px;}
  .back-link{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:#aaa;text-decoration:none;margin-bottom:8px;transition:color .15s;}
  .back-link:hover{color:var(--accent);}

  /* ── TAB NAV — exact question script style ── */
  .tab-nav{padding:0 16px;display:flex;gap:2px;border-bottom:1px solid var(--border);background:var(--surface);overflow-x:auto;scrollbar-width:none;position:sticky;top:80px;z-index:99;}
  .tab-nav::-webkit-scrollbar{display:none;}
  .tab-btn{padding:10px 16px;border:none;background:none;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text-soft);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;white-space:nowrap;}
  .tab-btn:hover{color:var(--text);background:var(--surface2);}
  .tab-btn.active{color:var(--text);border-bottom-color:var(--accent);font-weight:500;}

  /* ── CONTENT PANELS ── */
  .tab-panel{display:none;padding:20px 16px 60px;max-width:720px;margin:0 auto;}
  .tab-panel.active{display:block;}

  /* ── SECTION ── */
  .section-block{margin-bottom:32px;}
  .section-title{font-size:13px;font-weight:600;letter-spacing:.04em;margin-bottom:6px;padding-bottom:7px;border-bottom:1px solid var(--border);}
  .section-title.type-a  { color:var(--col-a-text);  }
  .section-title.type-de { color:var(--col-de-text); }
  .section-title.type-q  { color:var(--col-q-text);  }
  .section-title.type-t  { color:var(--col-t-text);  }

  .section-desc{font-size:13px;color:var(--text);margin-bottom:14px;line-height:1.7;}
  .section-desc strong{font-weight:600;}

  /* ── PATTERN CARD ── */
  .pattern-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.04);}

  .pattern-header{padding:11px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;}
  .pattern-header.type-a  { background:var(--col-a-bg);  border-bottom-color:var(--col-a-border);  }
  .pattern-header.type-de { background:var(--col-de-bg); border-bottom-color:var(--col-de-border); }
  .pattern-header.type-q  { background:var(--col-q-bg);  border-bottom-color:var(--col-q-border);  }
  .pattern-header.type-t  { background:var(--col-t-bg);  border-bottom-color:var(--col-t-border);  }

  .type-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;white-space:nowrap;flex-shrink:0;}
  .type-badge.type-a  { background:var(--col-a-bg);  color:var(--col-a-text);  border:1px solid var(--col-a-border);  }
  .type-badge.type-de { background:var(--col-de-bg); color:var(--col-de-text); border:1px solid var(--col-de-border); }
  .type-badge.type-q  { background:var(--col-q-bg);  color:var(--col-q-text);  border:1px solid var(--col-q-border);  }
  .type-badge.type-t  { background:var(--col-t-bg);  color:var(--col-t-text);  border:1px solid var(--col-t-border);  }

  /* card title — same size as sentence text */
  .pattern-fr{font-size:14px;font-weight:500;color:var(--text);flex:1;}
  .pattern-en{font-size:12px;color:var(--text-muted);white-space:nowrap;}
  .expand-icon{font-size:11px;color:var(--text-muted);flex-shrink:0;transition:transform .2s;}
  .expand-icon.open{transform:rotate(180deg);}

  /* ── EXAMPLES ── */
  .examples{display:none;}
  .examples.open{display:block;}
  .example-row{padding:13px 16px;border-bottom:0.5px solid var(--border);}
  .example-row:last-child{border-bottom:none;}

  /* verb phrase label — lowercase, muted */
  .ex-phrase{font-size:12.5px;font-weight:400;color:var(--text-muted);margin-bottom:10px;}

  /* sentence pair */
  .sentence-pair{display:flex;flex-direction:column;gap:10px;margin-bottom:8px;}
  .sent-row{display:flex;align-items:baseline;gap:10px;}
  .sent-tag{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;min-width:44px;flex-shrink:0;color:var(--text-muted);}
  .sent-tag.rel{color:var(--accent);}
  /* sentence text same size as card title */
  .sent-text{font-size:14px;line-height:1.85;color:var(--text);}

  /* chip highlights — background chip, not bold */
  .r1{background:var(--r1-bg);color:var(--r1-text);border-radius:3px;padding:0 3px;}
  .r2{background:var(--r2-bg);color:var(--r2-text);border-radius:3px;padding:0 3px;}
  .r3{background:var(--r3-bg);color:var(--r3-text);border-radius:3px;padding:0 3px;}
  .r4{background:var(--r4-bg);color:var(--r4-text);border-radius:3px;padding:0 3px;}

  .ex-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px;}
  .cat-tag{font-size:10px;font-weight:600;padding:1px 7px;border-radius:10px;border:1px solid;}
  .tag-education    {background:#eff6ff;color:#2563eb;border-color:#bfdbfe;}
  .tag-famille      {background:#fff5f5;color:#dc2626;border-color:#fecaca;}
  .tag-environnement{background:#f0fdf4;color:#16a34a;border-color:#bbf7d0;}
  .tag-technologie  {background:#fffbeb;color:#d97706;border-color:#fde68a;}
  .tag-economique   {background:#fdf2f8;color:#be185d;border-color:#fbcfe8;}
  .tag-sante        {background:#f0fafe;color:#0891b2;border-color:#bae6fd;}
  .tag-culture      {background:#f5f0ff;color:#7c3aed;border-color:#ddd6fe;}

  /* tricky note */
  .tricky-note{background:var(--col-t-bg);border:1px solid var(--col-t-border);border-radius:6px;padding:9px 12px;font-size:13px;color:var(--col-t-text);line-height:1.65;margin-bottom:10px;}
</style>
</head>
<body>

<header class="site-header">
  <a class="back-link" href="../index.html">← Retour</a>
  <h1>TCF Canada — <span>Conseils</span></h1>
  <div class="page-title">Verbes &amp; Pronoms relatifs</div>
</header>

<nav class="tab-nav">
  <button class="tab-btn active" onclick="showTab('all',this)">Tous</button>
  <button class="tab-btn" onclick="showTab('a',this)">à · auquel</button>
  <button class="tab-btn" onclick="showTab('de',this)">de · dont</button>
  <button class="tab-btn" onclick="showTab('q',this)">— · que</button>
  <button class="tab-btn" onclick="showTab('t',this)">⚠️ Pièges</button>
</nav>

<div id="panel-all" class="tab-panel active"></div>
<div id="panel-a"   class="tab-panel"></div>
<div id="panel-de"  class="tab-panel"></div>

<div id="panel-t"   class="tab-panel"></div>

function tok(tokens){
  return tokens.map(tk => tk.t==='n' ? tk.w : `<span class="${tk.t}">${tk.w}</span>`).join('');
}
function makeTags(arr){
  return arr.map(t=>`<span class="cat-tag tag-${t}">${t.charAt(0).toUpperCase()+t.slice(1)}</span>`).join('');
}
function badgeLabel(type){
  return {a:'auquel',de:'dont',q:'que',t:'piège'}[type];
}

// Each verb card gets a unique id scoped to its panel prefix
// to avoid duplicate-id conflicts across panels
function buildPanel(sections, prefix){
  let html = '';
  sections.forEach(s => {
    html += `<div class="section-block">
      <div class="section-title type-${s.type}">${s.label}</div>
      <div class="section-desc">${s.desc}</div>`;
    s.verbs.forEach(v => {
      const uid = prefix + v.id;
      html += `<div class="pattern-card">
        <div class="pattern-header type-${s.type}" onclick="toggleV('${uid}')">
          <span class="type-badge type-${s.type}">${badgeLabel(s.type)}</span>
          <span class="pattern-fr">${v.fr}</span>
          <span class="pattern-en">${v.en}</span>
          <span class="expand-icon" id="icon-${uid}">▾</span>
        </div>
        <div class="examples" id="ex-${uid}">`;
      if(v.tricky){
        html += `<div class="example-row"><div class="tricky-note">${v.tricky}</div></div>`;
      }
      v.examples.forEach(ex => {
        html += `<div class="example-row">
          <div class="ex-phrase">${ex.phrase}</div>
          <div class="sentence-pair">
            <div class="sent-row"><span class="sent-tag simple">Simple</span><span class="sent-text">${tok(ex.simple)}</span></div>
            <div class="sent-row"><span class="sent-tag rel">Relatif</span><span class="sent-text">${tok(ex.rel)}</span></div>
          </div>
          <div class="ex-tags">${makeTags(ex.tags)}</div>
        </div>`;
      });
      html += `</div></div>`;
    });
    html += `</div>`;
  });
  return html;
}

// Build each panel with its own prefix so IDs never collide
document.getElementById('panel-all').innerHTML = buildPanel(DATA, 'all_');
DATA.forEach(s => {
  document.getElementById(`panel-${s.type}`).innerHTML = buildPanel([s], `${s.type}_`);
});

function toggleV(uid){
  document.getElementById(`ex-${uid}`).classList.toggle('open');
  document.getElementById(`icon-${uid}`).classList.toggle('open');
}

function showTab(id, btn){
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`panel-${id}`).classList.add('active');
  btn.classList.add('active');
}
</script>
