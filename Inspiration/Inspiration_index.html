<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCF Canada — Banque d'Idées</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f7f4f0;--surface:#fff;--surface2:#f2ede8;--border:#e8e0d8;
    --text:#1e1a16;--text-soft:#6b5f55;--text-muted:#a89888;
    --accent:#c8703a;--radius:14px;--radius-sm:8px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);padding-bottom:40px;}

  /* ── HEADER ── */
  .header{background:var(--text);padding:20px 20px 10px;position:sticky;top:0;z-index:100;color:#fff;}
  .header-row{display:flex;align-items:center;justify-content:space-between;}
  .header h1{font-family:'Fraunces',serif;font-size:20px;font-weight:300;}
  .header em{color:var(--accent);font-style:italic;}
  .back-icon{font-size:20px;line-height:1;text-decoration:none;display:inline-flex;align-items:center;transition:transform .15s;}
  .back-icon:hover{transform:scale(1.15);}

  .motivation-bar{background:var(--text);padding:0 20px 10px;color:#fff;font-size:13px;font-weight:400;letter-spacing:0.3px;border-bottom:1px solid rgba(255,255,255,0.1);}

  /* ── FILTER DROPDOWN BAR ── */
  .filter-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:65px;z-index:90;}
  .filter-label{font-size:12px;color:var(--text-muted);white-space:nowrap;}
  .filter-select-wrap{position:relative;display:inline-flex;align-items:center;}
  .filter-select{appearance:none;-webkit-appearance:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--text);background:var(--surface2);border:1.5px solid var(--border);border-radius:20px;padding:6px 32px 6px 14px;cursor:pointer;outline:none;transition:border-color .15s;}
  .filter-select:focus{border-color:var(--accent);}
  .filter-chevron{position:absolute;right:11px;pointer-events:none;font-size:10px;color:var(--text-muted);}
  .filter-count{font-size:12px;color:var(--text-muted);margin-left:4px;}

  /* ── CARDS WRAP ── */
  .cards-wrap{padding:16px;display:flex;flex-direction:column;gap:16px;max-width:700px;margin:0 auto;}

  /* ── SECTION DIVIDER ── */
  .section-divider{font-family:'Fraunces',serif;font-size:15px;font-weight:400;color:var(--text-soft);padding:4px 0 2px;border-bottom:1px solid var(--border);margin-top:4px;}

  /* ── TOPIC CARD  (mirrors q-card) ── */
  .q-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.05);}
  .q-card-top{padding:16px;display:flex;flex-direction:column;gap:8px;}
  .cat-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:12px;font-size:11px;font-weight:600;}
  .q-text{font-size:14px;font-weight:600;line-height:1.5;}

  /* collapsed body */
  .q-card-body{display:none;padding:0 16px 16px;}
  .q-card-body.open{display:block;}

  /* avantages / inconvénients two-col */
  .contrast-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:12px 0 0;}
  @media(max-width:600px){.contrast-grid{grid-template-columns:1fr;}}
  .contrast-card{border-radius:var(--radius-sm);border:1px solid var(--border);overflow:hidden;}
  .card-pos-a{background-color:#f4faf7;}
  .card-pos-b{background-color:#fff8f0;}
  .contrast-header{padding:6px 10px;font-size:10px;font-weight:700;text-transform:uppercase;border-bottom:1px solid var(--border);}
  .contrast-header.pos-a{background:#eaf4ef;color:#2d6a4f;}
  .contrast-header.pos-b{background:#fdeede;color:#9a3412;}
  .contrast-item{padding:8px 10px;font-size:14px;border-bottom:1px solid rgba(0,0,0,0.03);line-height:1.4;display:flex;gap:8px;color:var(--text);}
  .contrast-item:last-child{border-bottom:none;}
  .contrast-item::before{content:"•";color:var(--accent);font-weight:bold;flex-shrink:0;}



  /* controls row */
  .q-controls{display:flex;justify-content:flex-end;align-items:center;padding-top:12px;border-top:1px solid var(--border);margin-top:12px;}
  .script-link{font-size:13px;font-weight:600;color:var(--accent);text-decoration:none;padding:6px 12px;background:#fdf0e8;border-radius:6px;border:1px solid #f0c8a8;}
  .script-link:hover{background:#f8e0cc;}

  .expand-btn{width:100%;padding:10px;background:none;border:none;border-top:1px solid var(--border);font-size:12px;color:var(--text-muted);cursor:pointer;font-family:'DM Sans',sans-serif;}
  .expand-btn:hover{color:var(--text-soft);}

  /* card bottom row with mots button */
  .card-actions{display:flex;justify-content:space-between;align-items:center;padding:0 16px 12px;gap:8px;}
  .mots-btn{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;color:var(--accent);background:#fdf0e8;border:1px solid #f0c8a8;border-radius:6px;padding:5px 11px;cursor:pointer;transition:background .15s;}
  .mots-btn:hover{background:#f8e0cc;}

  /* ── MODAL DRAWER ── */
  .modal-overlay{position:fixed;inset:0;background:rgba(30,26,22,.45);z-index:200;display:none;align-items:flex-end;}
  .modal-overlay.open{display:flex;}
  .modal-drawer{background:var(--bg);border-radius:20px 20px 0 0;width:100%;max-width:700px;margin:0 auto;max-height:88vh;display:flex;flex-direction:column;box-shadow:0 -8px 40px rgba(0,0,0,.18);}
  .modal-header{padding:16px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-shrink:0;}
  .modal-header-text{display:flex;flex-direction:column;gap:3px;}
  .modal-tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);}
  .modal-title{font-family:'Fraunces',serif;font-size:17px;font-weight:400;color:var(--text);line-height:1.35;}
  .modal-close{font-size:22px;background:none;border:none;cursor:pointer;color:var(--text-muted);flex-shrink:0;line-height:1;padding:2px;}
  .modal-body{overflow-y:auto;padding:16px 20px 32px;-webkit-overflow-scrolling:touch;}

  /* section headings inside modal */
  .lm-section-title{font-family:'Fraunces',serif;font-size:16px;font-weight:400;color:var(--accent);margin:20px 0 10px;}
  .lm-section-title:first-child{margin-top:0;}

  /* noun groups */
  .noun-group{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;margin-bottom:10px;}
  .noun-group-header{padding:7px 12px;font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text-muted);background:var(--surface2);border-bottom:1px solid var(--border);}
  .noun-row{display:flex;align-items:baseline;justify-content:space-between;padding:8px 12px;border-bottom:1px solid rgba(0,0,0,.04);gap:8px;}
  .noun-row:last-child{border-bottom:none;}
  .noun-fr{font-size:13.5px;font-weight:600;color:var(--text);}
  .noun-gender{font-size:11px;color:var(--text-muted);font-weight:400;margin-left:3px;}
  .noun-star{color:var(--accent);font-size:11px;margin-left:3px;}
  .noun-en{font-size:12.5px;color:var(--text-soft);text-align:right;flex-shrink:0;}

  /* verb table */
  .verb-table{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;border-collapse:collapse;margin-bottom:10px;}
  .verb-table thead tr{background:var(--surface2);}
  .verb-table th{padding:7px 10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);text-align:left;border-bottom:1px solid var(--border);}
  .verb-table td{padding:9px 10px;font-size:13px;border-bottom:1px solid rgba(0,0,0,.04);vertical-align:middle;}
  .verb-table tr:last-child td{border-bottom:none;}
  .verb-td-verb{font-weight:600;color:var(--text);}
  .verb-td-prep{font-weight:700;color:var(--accent);}
  .verb-td-pron{font-style:italic;color:var(--text-muted);}
  .verb-td-sens{color:var(--text-soft);}

  /* adjectives grid */
  .adj-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;margin-bottom:10px;}
  .adj-cell{padding:9px 12px;border-bottom:1px solid rgba(0,0,0,.04);border-right:1px solid rgba(0,0,0,.04);}
  .adj-cell:nth-child(2n){border-right:none;}
  .adj-fr{font-size:13px;font-weight:600;color:var(--text);}
  .adj-en{font-size:11.5px;color:var(--text-muted);margin-top:1px;}

  /* paires de contraste */
  .paire-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
  @media(max-width:480px){.paire-grid{grid-template-columns:1fr;}}
  .paire-col{border-radius:var(--radius-sm);border:1px solid var(--border);overflow:hidden;}
  .paire-header{padding:7px 10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border);}
  .paire-header.oui{background:#eaf4ef;color:#2d6a4f;}
  .paire-header.non{background:#e8f2ff;color:#185fa5;}
  .paire-item{padding:8px 10px;font-size:13px;border-bottom:1px solid rgba(0,0,0,.04);color:var(--text);line-height:1.4;}
  .paire-item:last-child{border-bottom:none;}

  /* phrases figées */
  .phrase-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:13px 14px;margin-bottom:8px;}
  .phrase-fr{font-size:13.5px;font-weight:600;color:var(--text);line-height:1.45;margin-bottom:5px;}
  .phrase-en{font-size:12.5px;color:var(--text-soft);margin-bottom:5px;line-height:1.4;}
  .phrase-note{font-size:11.5px;color:var(--text-muted);line-height:1.4;}
</style>
</head>

function filterCards(){
  const cat = document.getElementById('catSelect').value;
  const filtered = cat === 'all' ? TOPICS : TOPICS.filter(t => t.cat === cat);
  document.getElementById('filterCount').textContent = `${filtered.length} sujet${filtered.length>1?'s':''}`;
  renderCards(filtered);
}

function renderCards(list){
  const wrap = document.getElementById('cardsWrap');
  let html = '';
  let lastCat = null;

  list.forEach(t => {
    if(t.catLabel !== lastCat){
      html += `<div class="section-divider">${t.catLabel}</div>`;
      lastCat = t.catLabel;
    }
    html += `
    <div class="q-card">
      <div class="q-card-top">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
          <span class="cat-badge" style="background:${t.catBg};color:${t.catColor};">${t.catLabel}</span>
        </div>
        <div class="q-text">${t.title}</div>
      </div>
      <div class="q-card-body" id="body-${t.id}">
        <div class="contrast-grid">
          <div class="contrast-card card-pos-a">
            <div class="contrast-header pos-a">✓ Avantages</div>
            ${t.avantages.map(a=>`<div class="contrast-item">${a}</div>`).join('')}
          </div>
          <div class="contrast-card card-pos-b">
            <div class="contrast-header pos-b">✗ Inconvénients</div>
            ${t.inconvenients.map(i=>`<div class="contrast-item">${i}</div>`).join('')}
          </div>
        </div>
      </div>
      <div class="card-actions">
        <button class="mots-btn" onclick="openMots(event,${t.id})">📖 Liste de mots</button>
        ${t.scriptUrl ? `<a href="../${t.scriptUrl}" class="script-link">Voir le script →</a>` : '<span></span>'}
      </div>
      <button class="expand-btn" onclick="toggleCard(${t.id})">
        <span id="arr-${t.id}">▼ Développer</span>
      </button>
    </div>`;
  });

  wrap.innerHTML = html;
  document.getElementById('filterCount').textContent = `${list.length} sujet${list.length>1?'s':''}`;
}

function toggleCard(id){
  const body = document.getElementById(`body-${id}`);
  const btn  = document.getElementById(`arr-${id}`);
  const isOpen = body.classList.toggle('open');
  btn.textContent = isOpen ? '▲ Réduire' : '▼ Développer';
}

//  MODAL FUNCTIONS
// ══════════════════════════════════════════
function openMots(e, id){
  e.stopPropagation();
  const t = TOPICS.find(x=>x.id===id);
  const d = LISTE[id];
  document.getElementById('modalTag').textContent = t.catLabel + ' · Liste de mots';
  document.getElementById('modalTitle').textContent = t.title;

  if(!d){
    document.getElementById('modalBody').innerHTML =
      `<p style="color:var(--text-muted);font-size:13px;padding:20px 0;">Liste de mots à venir pour ce sujet.</p>`;
  } else {
    document.getElementById('modalBody').innerHTML = buildListe(d);
  }
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(){
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function closeModalOutside(e){
  if(e.target === document.getElementById('modalOverlay')) closeModal();
}

function buildListe(d){
  let html = '';

  // 1. NOMS
  html += `<div class="lm-section-title">Noms — clés du sujet</div>`;
  d.nouns.forEach(g => {
    html += `<div class="noun-group">
      <div class="noun-group-header">${g.group} &nbsp;★ = exam priority</div>`;
    g.items.forEach(n => {
      html += `<div class="noun-row">
        <span class="noun-fr">${n.fr} <span class="noun-gender">(${n.gender})</span><span class="noun-star"> ★</span></span>
        <span class="noun-en">${n.en}</span>
      </div>`;
    });
    html += `</div>`;
  });

  // 2. VERBES + PRÉPOSITIONS
  html += `<div class="lm-section-title">Verbes + prépositions</div>`;
  html += `<table class="verb-table"><thead><tr>
    <th>Verbe</th><th>Prép.</th><th>Pronom rel.</th><th>Sens</th>
  </tr></thead><tbody>`;
  d.verbes.forEach(v => {
    html += `<tr>
      <td class="verb-td-verb">${v.v}</td>
      <td class="verb-td-prep">${v.prep}</td>
      <td class="verb-td-pron">${v.pron}</td>
      <td class="verb-td-sens">${v.en}</td>
    </tr>`;
  });
  html += `</tbody></table>`;

  // 3. ADJECTIFS
  html += `<div class="lm-section-title">Adjectifs utiles</div>`;
  html += `<div class="adj-grid">`;
  d.adj.forEach(a => {
    html += `<div class="adj-cell"><div class="adj-fr">${a.fr}</div><div class="adj-en">${a.en}</div></div>`;
  });
  html += `</div>`;

  // 4. PAIRES DE CONTRASTE
  html += `<div class="lm-section-title">Paires de contraste</div>`;
  html += `<div class="paire-grid">
    <div class="paire-col">
      <div class="paire-header oui">${d.paires.ouiLabel}</div>
      ${d.paires.oui.map(p=>`<div class="paire-item">${p}</div>`).join('')}
    </div>
    <div class="paire-col">
      <div class="paire-header non">${d.paires.nonLabel}</div>
      ${d.paires.non.map(p=>`<div class="paire-item">${p}</div>`).join('')}
    </div>
  </div>`;

  // 5. PHRASES FIGÉES C1
  html += `<div class="lm-section-title">Phrases figées C1 — mémoriser en bloc</div>`;
  d.phrases.forEach(p => {
    html += `<div class="phrase-card">
      <div class="phrase-fr">${p.fr}</div>
      <div class="phrase-en">${p.en}</div>
      <div class="phrase-note">${p.note}</div>
    </div>`;
  });

  return html;
}

// init
renderCards(TOPICS);
</script>
</body>
</html>
