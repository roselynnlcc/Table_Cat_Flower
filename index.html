<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCF Canada — Tâche 3</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="questions.js"></script>
<style>
  :root {
    --bg:#f7f4f0;--surface:#fff;--border:#e8e0d8;
    --text:#1e1a16;--text-soft:#6b5f55;--text-muted:#a89888;
    --accent:#c8703a;--radius:14px;--radius-sm:8px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);padding-bottom:40px;}

  .header{background:var(--text);padding:20px;position:sticky;top:0;z-index:100;color:#fff;}
  .header h1{font-family:'Fraunces',serif;font-size:20px;font-weight:300;}
  .header em{color:var(--accent);font-style:italic;}

  .cards-wrap{padding:16px;display:flex;flex-direction:column;gap:16px;max-width:700px;margin:0 auto;}
  .q-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.05);}
  
  .q-card-top{padding:16px;display:flex;flex-direction:column;gap:8px;}
  .q-text{font-size:16px;font-weight:600;line-height:1.4;}

  .q-card-body{display:none;padding:0 16px 16px;}
  .q-card-body.open{display:block;}

  /* Design des points (Style Script) */
  .contrast-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom:16px; }
  @media (max-width: 600px) { .contrast-grid { grid-template-columns: 1fr; } }
  
  .contrast-card { background: #fff; border-radius: var(--radius-sm); border: 1px solid var(--border); overflow: hidden; }
  .contrast-header { padding: 6px 10px; font-size: 10px; font-weight: 700; text-transform: uppercase; border-bottom: 1px solid var(--border); }
  .contrast-header.pos-a { background: #eaf4ef; color: #2d6a4f; }
  .contrast-header.pos-b { background: #e8f2ff; color: #185fa5; }
  
  .contrast-item { 
    padding: 8px 10px; 
    font-size: 14px; /* +2 unit */
    border-bottom: 1px solid #f0f0f0; 
    line-height: 1.4;
    display: flex;
    gap: 8px;
  }
  /* Puce élégante */
  .contrast-item::before { content: "•"; color: var(--accent); font-weight: bold; }
  .contrast-item:last-child { border-bottom: none; }

  /* Barre de contrôle du bas */
  .q-controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  .ctrl-left { display: flex; align-items: center; gap: 12px; }
  .stars { color: #f59e0b; font-size: 16px; }
  .status-badge { 
    font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 6px;
    background: var(--bg); color: var(--text-soft); border: 1px solid var(--border);
  }
  /* Couleurs de statut */
  .status-Prêt { background: #eaf4ef; color: #2d6a4f; border-color: #c2e0d1; }
  .status-Maîtrisé { background: #2d6a4f; color: #fff; border-color: #2d6a4f; }

  .script-link {
    font-size: 13px; font-weight: 600; color: var(--accent); text-decoration: none;
    padding: 6px 12px; background: #fdf0e8; border-radius: 6px; border: 1px solid #f0c8a8;
  }

  .expand-btn {
    width: 100%; padding: 10px; background: none; border: none; border-top: 1px solid var(--border);
    font-size: 12px; color: var(--text-muted); cursor: pointer;
  }
</style>
</head>
<body>

<header class="header">
  <h1>TCF Canada — <em>Tâche 3</em></h1>
</header>

<div class="cards-wrap" id="cardsWrap"></div>

<script>
// On utilise directement TCF_QUESTIONS de questions.js sans localStorage pour les data
function render() {
  const wrap = document.getElementById('cardsWrap');
  
  wrap.innerHTML = TCF_QUESTIONS.slice().reverse().map(q => {
    // Valeurs par défaut si non définies dans JS
    const starsCount = q.stars || 0;
    const currentStatus = q.status || "À faire";
    const starHTML = "★".repeat(starsCount) + "☆".repeat(3 - starsCount);
    
    return `
      <div class="q-card">
        <div class="q-card-top">
          <div style="display:flex; justify-content:space-between; font-size:11px; color:var(--text-muted);">
            <span>ID: ${q.id}</span>
            <span>${q.date || '—'}</span>
          </div>
          <div class="q-text">${q.question}</div>
        </div>
  
        <div class="q-card-body" id="body-${q.id}">
          <div class="paire-display" id="paire-display-${q.id}"></div>
          
          <div class="q-controls">
            <div class="ctrl-left">
              <span class="stars">${starHTML}</span>
              <span class="status-badge status-${currentStatus.replace(' ', '')}">${currentStatus}</span>
            </div>
            ${q.scriptUrl ? `<a href="${q.scriptUrl}" class="script-link">Voir le script →</a>` : ''}
          </div>
        </div>

        <button class="expand-btn" onclick="toggleCard(${q.id})">
          <span id="arr-${q.id}">▼ Détails</span>
        </button>
      </div>`;
  }).join('');
}

async function toggleCard(id) {
  const body = document.getElementById(`body-${id}`);
  const btn = document.getElementById(`arr-${id}`);
  const isOpen = body.classList.toggle('open');
  btn.textContent = isOpen ? '▲ Réduire' : '▼ Détails';

  if (isOpen) {
    const q = TCF_QUESTIONS.find(item => item.id === id);
    const container = document.getElementById(`paire-display-${id}`);
    
    if (q && q.scriptUrl && container.innerHTML === "") {
      container.innerHTML = "<small>Chargement...</small>";
      try {
        const response = await fetch(q.scriptUrl);
        const html = await response.text();
        const doc = new DOMParser().parseFromString(html, 'text/html');
        const cards = doc.querySelectorAll('.contrast-card');
        
        if (cards.length >= 2) {
          const buildSection = (card, colorClass) => {
            const title = card.querySelector('.contrast-header').innerText;
            const items = Array.from(card.querySelectorAll('.contrast-item'))
                               .map(i => `<div class="contrast-item">${i.innerText}</div>`).join('');
            return `<div class="contrast-card">
                      <div class="contrast-header ${colorClass}">${title}</div>
                      ${items}
                    </div>`;
          };

          container.innerHTML = `
            <div class="contrast-grid">
              ${buildSection(cards[0], 'pos-a')}
              ${buildSection(cards[1], 'pos-b')}
            </div>`;
        }
      } catch (e) { container.innerHTML = ""; }
    }
  }
}

render();
</script>
</body>
</html>
