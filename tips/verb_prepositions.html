<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCF — Verbes &amp; Prépositions</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="../favicon.png">
<style>
  :root {
    --bg:#f5f2ee;--surface:#fff;--surface2:#f9f7f4;--border:#e5e0d8;
    --text:#1a1714;--text-soft:#6b6460;--text-muted:#9d9590;
    --accent:#c8955a;--radius:12px;--radius-sm:6px;

    /* type colours — card headers & filter pills */
    --blue-bg:#e8f2ff;   --blue-text:#185fa5;  --blue-border:#c0d8f8;
    --green-bg:#eaf4ef;  --green-text:#2d6a4f; --green-border:#c3e6d4;
    --grey-bg:#f3f3f1;   --grey-text:#555250;  --grey-border:#d9d4cd;
    --red-bg:#fff1f2;    --red-text:#b91c1c;   --red-border:#fecdd3;

    /* sentence role colours — drawn from question page palette */
    --r1:#8b1a35;   /* subject   — deep pink/crimson  */
    --r2:#2d6a4f;   /* verb      — forest green        */
    --r3:#92400e;   /* prep/pro  — amber               */
    --r4:#1a3d7a;   /* object    — dark blue           */
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

  /* ── HEADER ── */
  .site-header{background:var(--text);color:#fff;padding:20px 20px 16px;position:sticky;top:0;z-index:100;}
  .site-header h1{font-family:'Fraunces',serif;font-size:18px;font-weight:300;color:#fff;}
  .site-header h1 span{color:var(--accent);font-style:italic;}
  .page-title{font-size:15px;font-weight:500;color:#fff;margin-top:6px;}
  .page-subtitle{font-size:12px;color:#aaa;margin-top:2px;}
  .back-link{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:#aaa;text-decoration:none;margin-bottom:8px;transition:color .15s;}
  .back-link:hover{color:var(--accent);}

  /* ── FILTER BAR ── */
  .filter-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
  .filter-bar::-webkit-scrollbar{display:none;}
  .filter-pills{display:flex;gap:8px;width:max-content;}
  .fpill{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text-soft);cursor:pointer;white-space:nowrap;transition:all .15s;}
  .fpill.active-all { border-color:var(--accent);  background:#fdf5ed;         color:var(--accent);      }
  .fpill.active-a   { border-color:var(--blue-border);  background:var(--blue-bg);  color:var(--blue-text);  }
  .fpill.active-de  { border-color:var(--green-border); background:var(--green-bg); color:var(--green-text); }
  .fpill.active-q   { border-color:var(--grey-border);  background:var(--grey-bg);  color:var(--grey-text);  }
  .fpill.active-t   { border-color:var(--red-border);   background:var(--red-bg);   color:var(--red-text);   }

  /* ── PAGE WRAP ── */
  .page-wrap{max-width:720px;margin:0 auto;padding:24px 16px 60px;}

  /* ── SECTION ── */
  .section-block{margin-bottom:36px;}
  .section-title{font-family:'Fraunces',serif;font-size:16px;font-weight:400;color:var(--accent);margin-bottom:4px;padding-bottom:7px;border-bottom:1px solid var(--border);}
  .section-desc{font-size:13px;color:var(--text-muted);margin-bottom:16px;line-height:1.6;}

  /* ── PATTERN CARD ── */
  .pattern-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
  .pattern-header{padding:10px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;}
  .pattern-header.type-a  { background:var(--blue-bg);  border-bottom-color:var(--blue-border);  }
  .pattern-header.type-de { background:var(--green-bg); border-bottom-color:var(--green-border); }
  .pattern-header.type-q  { background:var(--grey-bg);  border-bottom-color:var(--grey-border);  }
  .pattern-header.type-t  { background:var(--red-bg);   border-bottom-color:var(--red-border);   }

  /* type badge (replaces arrow) */
  .type-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;white-space:nowrap;flex-shrink:0;}
  .type-badge.type-a  { background:var(--blue-bg);  color:var(--blue-text);  border:1px solid var(--blue-border);  }
  .type-badge.type-de { background:var(--green-bg); color:var(--green-text); border:1px solid var(--green-border); }
  .type-badge.type-q  { background:var(--grey-bg);  color:var(--grey-text);  border:1px solid var(--grey-border);  }
  .type-badge.type-t  { background:var(--red-bg);   color:var(--red-text);   border:1px solid var(--red-border);   }

  .pattern-fr{font-size:14px;font-weight:500;color:var(--text);flex:1;}
  .pattern-en{font-size:12px;color:var(--text-muted);margin-left:auto;white-space:nowrap;}
  .expand-icon{font-size:11px;color:var(--text-muted);flex-shrink:0;transition:transform .2s;}
  .expand-icon.open{transform:rotate(180deg);}

  /* ── EXAMPLES (collapsed by default) ── */
  .examples{display:none;padding:4px 0;}
  .examples.open{display:block;}
  .example-row{padding:12px 16px;border-bottom:0.5px solid var(--border);}
  .example-row:last-child{border-bottom:none;}

  .ex-phrase{font-size:13px;font-weight:500;color:var(--text-soft);margin-bottom:9px;}

  .sentence-pair{display:flex;flex-direction:column;gap:7px;margin-bottom:8px;}
  .sent-row{display:flex;align-items:flex-start;gap:9px;}
  .sent-tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;min-width:44px;padding-top:2px;flex-shrink:0;color:var(--text-muted);}
  .sent-tag.rel{color:var(--accent);}
  .sent-text{font-size:13.5px;line-height:1.65;color:var(--text-soft);}

  /* sentence colour roles */
  .r1{color:var(--r1);font-weight:600;}
  .r2{color:var(--r2);font-weight:600;}
  .r3{color:var(--r3);font-weight:700;}
  .r4{color:var(--r4);font-weight:600;}

  .ex-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;}
  .cat-tag{font-size:10px;font-weight:600;padding:1px 7px;border-radius:10px;border:1px solid;}
  .tag-education   {background:#eff6ff;color:#2563eb;border-color:#bfdbfe;}
  .tag-famille     {background:#fff5f5;color:#dc2626;border-color:#fecaca;}
  .tag-environnement{background:#f0fdf4;color:#16a34a;border-color:#bbf7d0;}
  .tag-technologie {background:#fffbeb;color:#d97706;border-color:#fde68a;}
  .tag-economique  {background:#fdf2f8;color:#be185d;border-color:#fbcfe8;}
  .tag-sante       {background:#f0fafe;color:#0891b2;border-color:#bae6fd;}
  .tag-culture     {background:#f5f0ff;color:#7c3aed;border-color:#ddd6fe;}

  /* tricky note */
  .tricky-note{background:var(--red-bg);border:1px solid var(--red-border);border-radius:6px;padding:9px 11px;font-size:12.5px;color:var(--red-text);line-height:1.6;margin-bottom:10px;}
</style>
</head>
<body>

<header class="site-header">
  <a class="back-link" href="../index.html">← Retour</a>
  <h1>TCF Canada — <span>Conseils</span></h1>
  <div class="page-title">Verbes &amp; Pronoms relatifs</div>
  <div class="page-subtitle">auquel · dont · que · verbes pièges · tap pour voir les exemples</div>
</header>

<div class="filter-bar">
  <div class="filter-pills" id="filterPills">
    <button class="fpill active-all" onclick="setFilter('all',this)">Tous</button>
    <button class="fpill" onclick="setFilter('a',this)"><strong>à</strong> · auquel</button>
    <button class="fpill" onclick="setFilter('de',this)"><strong>de</strong> · dont</button>
    <button class="fpill" onclick="setFilter('q',this)"><strong>—</strong> · que</button>
    <button class="fpill" onclick="setFilter('t',this)">⚠️ Pièges</button>
  </div>
</div>

<div class="page-wrap">
  <div id="mainContent"></div>
</div>

          simple:[{t:'r1',w:'On'},{t:'n',w:' '},{t:'r2',w:'attend'},{t:'n',w:' '},{t:'r4',w:'les résultats'},{t:'n',w:'.'}],
          rel:   [{t:'r4',w:'Les résultats'},{t:'n',w:' '},{t:'r3',w:'que'},{t:'n',w:' '},{t:'r1',w:"l'on"},{t:'n',w:' '},{t:'r2',w:'attend'},{t:'n',w:' tardent à venir.'}],
          tags:['education','economique'] }] },
      { id:'v21', fr:'chercher (qqch)', en:'to look for — ❌ sans préposition en français',
        tricky:'Anglais : "look <u>for</u>" → Français : chercher <strong>sans préposition</strong>. Pronom relatif : <strong>que</strong>.',
        examples:[{ phrase:'chercher un emploi stable',
          simple:[{t:'r1',w:'Les diplômés'},{t:'n',w:' '},{t:'r2',w:'cherchent'},{t:'n',w:' '},{t:'r4',w:'un emploi stable'},{t:'n',w:'.'}],
          rel:   [{t:'r4',w:"L'emploi stable"},{t:'n',w:' '},{t:'r3',w:'que'},{t:'n',w:' '},{t:'r1',w:'les diplômés'},{t:'n',w:' '},{t:'r2',w:'cherchent'},{t:'n',w:' est rare.'}],
          tags:['economique','education'] }] },
      { id:'v22', fr:'obéir à', en:'to obey — ✅ besoin de à en français',
        tricky:'Anglais : "obey" sans préposition → Français : obéir <strong>à</strong>. Pronom relatif : <strong>auquel / auxquels</strong>.',
        examples:[{ phrase:'obéir à leurs parents',
          simple:[{t:'r1',w:'Les enfants'},{t:'n',w:' '},{t:'r2',w:'obéissent'},{t:'n',w:' '},{t:'r3',w:'à'},{t:'n',w:' '},{t:'r4',w:'leurs parents'},{t:'n',w:'.'}],
          rel:   [{t:'r4',w:'Les parents'},{t:'n',w:' '},{t:'r3',w:'auxquels'},{t:'n',w:' '},{t:'r1',w:'les enfants'},{t:'n',w:' '},{t:'r2',w:'obéissent'},{t:'n',w:' jouent un rôle clé.'}],
          tags:['famille','education'] }] }
    ]
  }
];

let activeFilter = 'all';

function tok(tokens){
  return tokens.map(tk => tk.t==='n' ? tk.w : `<span class="${tk.t}">${tk.w}</span>`).join('');
}
function makeTags(arr){
  return arr.map(t=>`<span class="cat-tag tag-${t}">${t.charAt(0).toUpperCase()+t.slice(1)}</span>`).join('');
}

function renderAll(){
  const sections = activeFilter==='all' ? DATA : DATA.filter(s=>s.type===activeFilter);
  let html = '';
  sections.forEach(s => {
    html += `<div class="section-block">
      <div class="section-title">${s.label}</div>
      <div class="section-desc">${s.desc}</div>`;

    s.verbs.forEach(v => {
      html += `<div class="pattern-card">
        <div class="pattern-header type-${s.type}" onclick="toggleV('${v.id}')">
          <span class="type-badge type-${s.type}">${badgeLabel(s.type)}</span>
          <span class="pattern-fr">${v.fr}</span>
          <span class="pattern-en">${v.en}</span>
          <span class="expand-icon" id="icon-${v.id}">▾</span>
        </div>
        <div class="examples" id="ex-${v.id}">`;

      if(v.tricky){
        html += `<div class="example-row"><div class="tricky-note">${v.tricky}</div></div>`;
      }

      v.examples.forEach(ex => {
        html += `<div class="example-row">
          <div class="ex-phrase">${ex.phrase}</div>
          <div class="sentence-pair">
            <div class="sent-row"><span class="sent-tag simple">Simple</span><span class="sent-text">${tok(ex.simple)}</span></div>
            <div class="sent-row"><span class="sent-tag rel">Relatif</span><span class="sent-text">${tok(ex.rel)}</span></div>
          </div>
          <div class="ex-tags">${makeTags(ex.tags)}</div>
        </div>`;
      });

      html += `</div></div>`;
    });

    html += `</div>`;
  });
  document.getElementById('mainContent').innerHTML = html;
}

function badgeLabel(type){
  return {a:'auquel',de:'dont',q:'que',t:'piège'}[type];
}

function toggleV(id){
  document.getElementById(`ex-${id}`).classList.toggle('open');
  document.getElementById(`icon-${id}`).classList.toggle('open');
}

const FILTER_CLASSES = {all:'active-all',a:'active-a',de:'active-de',q:'active-q',t:'active-t'};
function setFilter(f, btn){
  activeFilter = f;
  document.querySelectorAll('.fpill').forEach(p => p.className='fpill');
  btn.classList.add(FILTER_CLASSES[f]);
  renderAll();
}

renderAll();
</script>
</body>
</html>
